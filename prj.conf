# Enable logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable GPIO and I2C
CONFIG_GPIO=y
CONFIG_I2C=y

# Enable sensor subsystem
CONFIG_SENSOR=y
CONFIG_LIS2DH=y

# Enable console and USB
CONFIG_UART_CONSOLE=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Engine Analyser"
CONFIG_USB_DEVICE_MANUFACTURER="Kothari"
CONFIG_USB_DEVICE_VID=0x0483
CONFIG_USB_DEVICE_PID=0x5740

# Enable USB CDC ACM Class
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Enable kernel features
CONFIG_EVENTS=y

# Enable FPU
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Enable MCUboot
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="bootloader/mcuboot/scripts/root-rsa-2048.pem"

# DFU Configuration
CONFIG_IMG_BLOCK_BUF_SIZE=512
CONFIG_UPDATEABLE_IMAGE_NUMBER=1
CONFIG_USB_REQUEST_BUFFER_SIZE=1024

# Disable UART logging backend
CONFIG_LOG_BACKEND_UART=n